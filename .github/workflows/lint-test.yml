name: Lint and Test
on: push

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
    - name: Create uv environment
      run: uv venv --python ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }} --all-groups --locked
    - name: Compute pre-commit cache key
      id: pre-commit-cache
      shell: python
      run: |
        import hashlib
        import sys

        python = "py{}.{}".format(*sys.version_info[:2])
        payload = sys.version.encode() + sys.executable.encode()
        digest = hashlib.sha256(payload).hexdigest()
        result = "${{ runner.os }}-{}-{}-pre-commit".format(python, digest[:8])

        print(f"result={result}")
    - name: Restore pre-commit cache
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
          path: ~/.cache/pre-commit
          key: ${{ steps.pre-commit-cache.outputs.result }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ steps.pre-commit-cache.outputs.result }}-
    - run: uv run ruff check .
    - name: Run type checks
      run: |
        uv run ty check src tests
        uv run pyrefly check src tests
    - name: Run complexity checks
      run: uv run lizard --languages python src
    - name: Run package metadata checks
      run: uv run pyroma --min 10 .
    - run: uv run deptry .
    - name: Run tests with coverage
      run: uv run pytest --cov=pyldraw3_tui --cov-report=lcov --cov-report=html
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload coverage report as artifact
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: coverage-report-python-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 30
